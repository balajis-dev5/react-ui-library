<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="@balaji/ui — typed, accessible React 19 component library. Live docs with keyboard-testable examples for every component." />
    <title>@balaji/ui — React UI Library</title>
    <script>
      const t = localStorage.getItem('ui-theme')
      if (t === 'dark' || (!t && matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark')
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/docs/main.tsx"></script>
  </body>
</html>
